services:
  # Backend API
  - type: web
    name: kitap-dagitim-api
    env: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false # Render panelinden Supabase URL'nizi ekleyin
      - key: PORT
        value: 5000

  # Frontend UI
  - type: web
    name: kitap-dagitim-ui
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
